name: Apply EN copy edits

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .copyedit-trigger

permissions:
  contents: write

jobs:
  apply-edits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply sharper EN copy edits
        run: python .github/scripts/apply_en_copyedits.py

      - name: Commit changes
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "chatgpt-copyedit-bot"
            git config user.email "gpt@euroatlantic.ag"
            git add index.html the-lvs-trap.html the-evidence-room.html the-pictet-pitch.html sap-syncpilot-vendor-risk.html the-goldfinger-connection.html the-95-percent-discount.html syncpilot.html vendor-risk.html shareholders.html network.html
            git commit -m "Copy-edit English investigation pages"
            git push
          else
            echo "No changes to commit."
          fi
